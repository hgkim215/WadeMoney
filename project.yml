name: WadeMoney
options:
  bundleIdPrefix: com.kimhyeongi
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: ko
packages:
  WadeMoneyCore:
    path: WadeMoneyCore
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    DEVELOPMENT_TEAM: YSCZ6Z822R
    CODE_SIGN_STYLE: Automatic
targets:
  WadeMoney:
    type: application
    platform: iOS
    sources:
      - WadeMoney
    dependencies:
      - package: WadeMoneyCore
      - target: WadeMoneyWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimhyeongi.WadeMoney
        CODE_SIGN_ENTITLEMENTS: WadeMoney/WadeMoney.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: WadeMoney/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  WadeMoneyWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: WadeMoney/Models
      - path: WadeMoney/Mapping
      - path: WadeMoney/Stores
      - path: WadeMoney/Persistence
      - path: WadeMoney/Formatting
      - path: WadeMoney/DesignSystem
      - path: WadeMoney/Widgets
      - path: WadeMoney/Constants.swift
      - path: WadeMoney/DeepLink.swift
      - path: WadeMoney/Resources/Fonts
      - path: WadeMoneyWidgetsExtension
    dependencies:
      - package: WadeMoneyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimhyeongi.WadeMoney.Widgets
        CODE_SIGN_ENTITLEMENTS: WadeMoneyWidgetsExtension/WadeMoneyWidgets.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: WadeMoneyWidgetsExtension/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
  WadeMoneyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WadeMoneyTests
    dependencies:
      - target: WadeMoney
      - package: WadeMoneyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimhyeongi.WadeMoneyTests
        GENERATE_INFOPLIST_FILE: "YES"
  WadeMoneyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - WadeMoneyUITests
    dependencies:
      - target: WadeMoney
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimhyeongi.WadeMoneyUITests
        TEST_TARGET_NAME: WadeMoney
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  WadeMoney:
    build:
      targets:
        WadeMoney: all
        WadeMoneyWidgets: all
        WadeMoneyTests: [test]
    test:
      targets:
        - WadeMoneyTests
  WadeMoneyUITests:
    build:
      targets:
        WadeMoney: all
        WadeMoneyUITests: [test]
    test:
      targets:
        - WadeMoneyUITests
