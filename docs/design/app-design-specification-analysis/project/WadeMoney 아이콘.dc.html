<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>*{box-sizing:border-box;}</style>
</helmet>

<div style="width:{{ size }}px;height:{{ size }}px;position:relative;overflow:hidden;border-radius:{{ radius }}px;flex:none;font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;">
  <div style="position:absolute;top:0;left:0;width:200px;height:200px;transform:scale({{ scale }});transform-origin:top left;">

    <sc-if value="{{ bgOn }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute;inset:0;border-radius:45px;background:linear-gradient(160deg,#FBF6EC,#F1E6D5);box-shadow:inset 0 2px 3px rgba(255,255,255,0.8);"></div>
    </sc-if>

    <!-- pig -->
    <div style="position:absolute;left:18px;bottom:14px;width:150px;height:152px;">
      <div style="position:absolute;top:2px;left:12px;width:46px;height:46px;border-radius:54% 54% 50% 8px;background:#EA8FA4;transform:rotate(-22deg);box-shadow:inset 0 3px 4px rgba(255,255,255,0.35);"></div>
      <div style="position:absolute;top:2px;right:12px;width:46px;height:46px;border-radius:54% 54% 8px 50%;background:#EA8FA4;transform:rotate(22deg);box-shadow:inset 0 3px 4px rgba(255,255,255,0.35);"></div>
      <div style="position:absolute;top:20px;left:3px;width:144px;height:130px;border-radius:50% 50% 47% 47%;background:radial-gradient(at 42% 30%,#FAC3CE,#EE97AB 76%);box-shadow:0 12px 22px rgba(180,90,110,0.28),inset 0 6px 9px rgba(255,255,255,0.5),inset 0 -10px 14px rgba(180,80,100,0.3);"></div>
      <!-- happy chewing eyes (∩) -->
      <div style="position:absolute;top:56px;left:40px;width:17px;height:20px;border-radius:50%;background:radial-gradient(at 38% 30%,#5B3B44,#3A252C);box-shadow:0 1px 2px rgba(0,0,0,0.15);"><div style="position:absolute;top:3px;left:3.5px;width:5.5px;height:5.5px;border-radius:50%;background:rgba(255,255,255,0.92);"></div></div>
      <div style="position:absolute;top:56px;left:90px;width:17px;height:20px;border-radius:50%;background:radial-gradient(at 38% 30%,#5B3B44,#3A252C);box-shadow:0 1px 2px rgba(0,0,0,0.15);"><div style="position:absolute;top:3px;left:3.5px;width:5.5px;height:5.5px;border-radius:50%;background:rgba(255,255,255,0.92);"></div></div>
      <!-- blush -->
      <div style="position:absolute;top:84px;left:16px;width:23px;height:13px;border-radius:50%;background:rgba(232,120,140,0.42);"></div>
      <div style="position:absolute;top:84px;right:16px;width:23px;height:13px;border-radius:50%;background:rgba(232,120,140,0.42);"></div>
      <!-- snout -->
      <div style="position:absolute;top:84px;left:50%;transform:translateX(-50%);width:58px;height:40px;border-radius:50%;background:radial-gradient(at 42% 32%,#F2AAB8,#E0899B);box-shadow:inset 0 -3px 5px rgba(160,70,90,0.3);display:flex;align-items:center;justify-content:center;gap:11px;">
        <div style="width:8px;height:13px;border-radius:50%;background:#B0687A;"></div>
        <div style="width:8px;height:13px;border-radius:50%;background:#B0687A;"></div>
      </div>
      <!-- open mouth (chewing) -->
      <div style="position:absolute;top:120px;left:50%;transform:translateX(-50%);width:26px;height:15px;border-radius:0 0 40px 40px;background:#8A4150;box-shadow:inset 0 2px 3px rgba(0,0,0,0.25);overflow:hidden;">
        <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:16px;height:10px;border-radius:50%;background:#EE8FA0;"></div>
      </div>
    </div>

    <!-- donut lifted to the mouth, tilted, being bitten -->
    <div style="position:absolute;right:6px;bottom:40px;width:72px;height:72px;transform:rotate(-16deg);z-index:2;filter:drop-shadow(0 6px 11px rgba(90,66,40,0.24));">
      <div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(#3E9E7A 0deg 160deg,#FBF6EC 160deg 165deg,#E0A93F 165deg 244deg,#FBF6EC 244deg 249deg,#6F9FD8 249deg 300deg,#FBF6EC 300deg 305deg,#EC8FB6 305deg 355deg,#FBF6EC 355deg 360deg);box-shadow:inset 0 3px 5px rgba(255,255,255,0.5),inset 0 -6px 9px rgba(31,90,70,0.22);display:flex;align-items:center;justify-content:center;-webkit-mask:radial-gradient(circle 18px at 4px 39px,transparent 16.5px,#000 17.5px);mask:radial-gradient(circle 18px at 4px 39px,transparent 16.5px,#000 17.5px);">
        <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(160deg,#FBF6EC,#F1E6D5);box-shadow:inset 0 2px 3px rgba(31,90,70,0.25);display:flex;align-items:center;justify-content:center;"><span style="font-size:16px;font-weight:800;color:#2E8E6E;">₩</span></div>
      </div>
    </div>
    <!-- crumbs near the mouth -->
    <div style="position:absolute;right:80px;bottom:60px;width:8px;height:8px;border-radius:2px;background:#3E9E7A;transform:rotate(20deg);z-index:3;"></div>
    <div style="position:absolute;right:90px;bottom:50px;width:6px;height:6px;border-radius:2px;background:#E0A93F;transform:rotate(-15deg);z-index:3;"></div>
    <div style="position:absolute;right:74px;bottom:48px;width:5px;height:5px;border-radius:50%;background:#EC8FB6;z-index:3;"></div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:240,&quot;height&quot;:240},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:220,&quot;min&quot;:40,&quot;max&quot;:512,&quot;tsType&quot;:&quot;number&quot;},&quot;bg&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const size = Number(this.props.size) || 220;
    const bg = this.props.bg !== false && this.props.bg !== 'false';
    return { size, scale: size/200, radius: Math.round(size*0.225), bgOn: bg };
  }
}
</script>
</body>
</html>
